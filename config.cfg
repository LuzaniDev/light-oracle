=============================================================================
 ORACLE RAG - CONFIG DO SISTEMA
=============================================================================
 Arquivo: config.cfg
 Local:   Raiz do projeto (./config.cfg)
 Formato: CHAVE = VALOR
          # comentarios
=============================================================================


=============================================================================
 1. DIRETORIOS
=============================================================================

# Onde o sistema guarda indices, cache e arquivos temporarios
# Se nao existir, sera criado automaticamente
# Exemplo: C:\Dados\Oraculo
BASE_DIR = %TEMP%/oracle-rag


=============================================================================
 2. MODELOS
=============================================================================

# --- Modelo de Embedding ---
# Converte textos em vetores para busca semantica
# Opcoes:
#   BAAI/bge-small-en-v1.5       (~33MB)  - Rapido, PT-BR suportado
#   BAAI/bge-base-en-v1.5        (~133MB) - Mais preciso
#   all-MiniLM-L6-v2             (~23MB)  - Mais rapido
EMBED_MODEL = BAAI/bge-small-en-v1.5

# Dimensao do vetor (menor = mais rapido)
EMBED_DIM = 256

# Processamento em lote (maior = mais memoria, mais rapido)
EMBED_BATCH = 32

# --- Modelo de Re-Ranking ---
# Reordena resultados para maior precisao
RERANKER_MODEL = cross-encoder/ms-marco-MiniLM-L-2-v2
RERANKER_BATCH = 16


=============================================================================
 3. DOCUMENTOS (CHUNKING)
=============================================================================

# Tamanho de cada pedaco em palavras
#   256 = busca precisa, contexto curto
#   512 = equilibrio (recomendado)
#   1024 = busca ampla, contexto longo
CHUNK_SIZE = 512

# Sobreposicao entre pedacos (evita cortar dados no meio)
CHUNK_OVERLAP = 64


=============================================================================
 4. BUSCA
=============================================================================

# Quantos resultados cada etapa retorna
BM25_TOP_K = 50     # Busca por palavras
DENSE_TOP_K = 50    # Busca por similaridade
RRF_TOP_K = 30      # Apos fundir BM25 + Denso

# Variacoes automaticas da pergunta (0 = desliga)
NUM_QUERIES = 3


=============================================================================
 5. SELF-RAG (CONFIANCA)
=============================================================================

# Confianca para resposta verde (Suportado)
# 0.60 = 60% de confianca
CONFIDENCE_HIGH = 0.60

# Confianca para resposta amarela (Parcial)
# Abaixo disso = vermelho (Nao encontrado)
CONFIDENCE_MEDIUM = 0.40


=============================================================================
 6. WEB FALLBACK
=============================================================================

# Buscar na web se documento nao tiver a resposta
WEB_FALLBACK = true

# Maximo de resultados web
WEB_MAX_RESULTS = 5


=============================================================================
 7. INTERFACE WEB
=============================================================================

# Porta do servidor (mude se a porta ja estiver em uso)
# 8080, 8081, 3000, 5000 sao comuns
WEB_PORT = 8081

# Host do servidor
# 127.0.0.1 = somente acesso local
# 0.0.0.0   = acesso de qualquer maquina na rede
WEB_HOST = 127.0.0.1


=============================================================================
 8. FIREBIRD (LK.ECO)
=============================================================================

# Nota: sistema NAO conecta automaticamente.
# So conecta quando usado comando sql ou interface web.

FB_HOST = localhost
FB_PORT = 3050
FB_USER = SYSDBA
FB_PASSWORD = masterkey
